<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
  <div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="max-w-md w-full text-center">
      <a href="https://github.com/cliftontoaster-reid/webserv" target="_blank"
        class="inline-block mb-8 transition hover:opacity-80">
        <div class="px-4 py-2 border-2 border-blue-600 rounded flex items-center justify-center">
          <span class="font-bold text-blue-600 tracking-wider">WebFloof</span>
          <span class="font-medium text-gray-600 ml-1">OSS</span>
        </div>
      </a>
      <h1 class="text-9xl font-extrabold text-blue-600">500</h1>
      <h2 class="text-2xl font-bold text-gray-800 mt-4">Something went wrong</h2>
      <p class="text-gray-600 mt-2 mb-6">
        {{ERR_MSG}}<br/>
        Our servers are having a bit of a hiccup.</br>
        We're already working to fix it.
      </p>
      <a href="/" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Back to Home
      </a>
    </div>
  </div>
</body>

</html>
