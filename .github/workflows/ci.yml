name: CI/CL
on:
  push:
    branches: 
      - main
  pull_request: 
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make
      
      - name: Building toml98
        run: |
          make -C libs/toml98 all
      
      - name: Running toml98's tests
        run: |
          make -C libs/toml98 test
          ./libs/toml98/tests/toml98_test --verbose