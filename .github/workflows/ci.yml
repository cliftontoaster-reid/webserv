name: CI/CL
on:
  push:
    branches: 
      - main
  pull_request: 
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MODE: release
      TARGET_BASE: ${{ github.workspace }}/target/release/webserv
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make cmake curl python3

      - name: Build toml98 tests
        run: make toml98-test MODE="$MODE" TARGET_DIR="$TARGET_BASE"

      - name: Run toml98 tests
        working-directory: libs/toml98/tests
        run: ./toml98_test --verbose

      - name: Build mon-cgi tests
        run: make mon-cgi-test MODE="$MODE" TARGET_DIR="$TARGET_BASE"

      - name: Run mon-cgi tests
        working-directory: libs/mon-cgi/tests
        run: ./mon_cgi_test --verbose

      - name: Build mon-http tests
        run: make mon-http-test MODE="$MODE" TARGET_DIR="$TARGET_BASE"

      - name: Run mon-http tests
        working-directory: libs/mon-http/tests
        run: ./mon_http_test --verbose

      - name: Build mon-net tests
        run: make mon-net-test MODE="$MODE" TARGET_DIR="$TARGET_BASE"

      - name: Run mon-net tests
        working-directory: libs/mon-net/tests
        run: ./mon_net_test --verbose

      - name: Build mon-router tests
        run: make mon-router-test MODE="$MODE" TARGET_DIR="$TARGET_BASE"

      - name: Run mon-router tests
        working-directory: libs/mon-router/tests
        run: ./mon_router_test --verbose

      - name: Build webserv tests
        run: make toml98 mon-cgi mon-http mon-net mon-router test MODE="$MODE" TARGET_DIR="$TARGET_BASE"

      - name: Run webserv tests
        working-directory: tests
        run: ./webserv_test --verbose

  format:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    concurrency:
      group: ci-format
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Install clang-format-22
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-format-22
          sudo ln -sf /usr/bin/clang-format-22 /usr/bin/clang-format

      - name: Show source files found
        run: |
          rm -f llvm.sh
          echo "clang-format version: $(clang-format --version)"
          echo "Source files:"
          find . -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.tpp' \) -not -path './.git/*'

      - name: Format codebase
        run: make format

      - name: Show modified files
        run: git status --porcelain

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push to PR
        if: steps.check.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format codebase"
          git push

      - name: Create PR with formatting changes
        if: steps.check.outputs.changed == 'true' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f llvm.sh
          BRANCH="chore/auto-format-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "style: auto-format codebase"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "style: auto-format codebase" \
            --body "Automated code formatting via \`make format\`." || \
          echo "PR creation failed (needs 'Allow GitHub Actions to create PRs' enabled in repo settings)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linter Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy make bear

      - name: Generate Compilation Database
        run: |
          # bear captures compiler flags by observing the build process
          bear -- make -C libs/toml98 all

      - name: Register Clang-Tidy Problem Matcher
        run: echo "::add-matcher::.github/clang-tidy-matcher.json"

      - name: Run Clang-Tidy
        run: |
          # Finds all source/header files and runs clang-tidy against them.
          # '-p .' points clang-tidy to the compile_commands.json generated by bear.
          find . -type f \( -name "*.cpp" -o -name "*.hpp" \) ! -path "*/target/*" ! -path "*/tests/*" | xargs -r clang-tidy -p .
