name: CI/CL
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        mode: [debug, release, coverage]
    runs-on: ubuntu-latest
    env:
      MODE: ${{ matrix.mode }}
      TARGET_ROOT: ${{ github.workspace }}/target/${{ matrix.mode }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake curl python3

      - name: Install coverage tools
        if: matrix.mode == 'coverage'
        run: sudo apt-get install -y lcov

      - name: Create profraw directory
        if: matrix.mode == 'coverage'
        run: mkdir -p "$TARGET_ROOT/profraw"

      - name: Build toml98 tests
        working-directory: libs/toml98
        run: make test MODE="$MODE" TARGET_DIR="$TARGET_ROOT/toml98"

      - name: Run toml98 tests
        working-directory: libs/toml98/tests
        run: ./toml98_test --verbose
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/${{ matrix.mode }}/profraw/toml98_test.profraw

      - name: Build mon-cgi tests
        working-directory: libs/mon-cgi
        run: make test MODE="$MODE" TARGET_DIR="$TARGET_ROOT/mon-cgi"

      - name: Run mon-cgi tests
        working-directory: libs/mon-cgi/tests
        run: ./mon_cgi_test --verbose
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/${{ matrix.mode }}/profraw/mon_cgi_test.profraw

      - name: Build mon-http tests
        working-directory: libs/mon-http
        run: make test MODE="$MODE" TARGET_DIR="$TARGET_ROOT/mon-http"

      - name: Run mon-http tests
        working-directory: libs/mon-http/tests
        run: ./mon_http_test --verbose
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/${{ matrix.mode }}/profraw/mon_http_test.profraw

      - name: Build mon-net tests
        working-directory: libs/mon-net
        run: make test MODE="$MODE" TARGET_DIR="$TARGET_ROOT/mon-net"

      - name: Run mon-net tests
        working-directory: libs/mon-net/tests
        run: ./mon_net_test --verbose
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/${{ matrix.mode }}/profraw/mon_net_test.profraw

      - name: Build mon-router tests
        working-directory: libs/mon-router
        run: make test MODE="$MODE" TARGET_DIR="$TARGET_ROOT/mon-router"

      - name: Run mon-router tests
        working-directory: libs/mon-router/tests
        run: ./mon_router_test --verbose
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/${{ matrix.mode }}/profraw/mon_router_test.profraw

      - name: Build webserv tests
        run: make test MODE="$MODE" TARGET_DIR="$TARGET_ROOT/webserv"

      - name: Run webserv tests
        working-directory: tests
        run: ./webserv_test --verbose
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/${{ matrix.mode }}/profraw/webserv_test.profraw

      - name: Generate coverage report
        if: matrix.mode == 'coverage'
        run: |
          mkdir -p target/coverage/profraw
          llvm-profdata merge -sparse target/coverage/profraw/*.profraw -o target/coverage/coverage.profdata
          for bin in toml98_test mon_cgi_test mon_http_test mon_net_test mon_router_test webserv_test; do
            path=$(find target/coverage -name "$bin" -type f)
            if [ -n "$path" ]; then
              llvm-cov export "$path" -instr-profile=target/coverage/coverage.profdata \
                -format=lcov >> target/coverage/coverage_raw.info
            fi
          done
          lcov --remove target/coverage/coverage_raw.info -o coverage.info \
            '/usr/*' '*/criterion/*' '*/tests/*'

      - name: Upload coverage reports to Codecov
        if: matrix.mode == 'coverage'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: true

  format:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    concurrency:
      group: ci-format
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Install clang-format-22
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-format-22
          sudo ln -sf /usr/bin/clang-format-22 /usr/bin/clang-format

      - name: Show source files found
        run: |
          rm -f llvm.sh
          echo "clang-format version: $(clang-format --version)"
          echo "Source files:"
          find . -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.tpp' \) -not -path './.git/*'

      - name: Format codebase
        run: make format

      - name: Show modified files
        run: git status --porcelain

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push to PR
        if: steps.check.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format codebase"
          git push

      - name: Create PR with formatting changes
        if: steps.check.outputs.changed == 'true' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f llvm.sh
          BRANCH="chore/auto-format-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "style: auto-format codebase"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "style: auto-format codebase" \
            --body "Automated code formatting via \`make format\`." || \
          echo "PR creation failed (needs 'Allow GitHub Actions to create PRs' enabled in repo settings)"
