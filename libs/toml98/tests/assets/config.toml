[[server]]
ports = [80]

[server.errors.404]
fs = '/srv/http/404.html'

[[server.endpoints]]
path = '/'
fs = '/srv/httpd/'

[[server.endpoints]]
path = '/static'
fs = '/srv/data/'

[[server.cgi]]
ext = '.php'
if = '/'
bin = '/php/path/here'

[[server.cgi]]
ext = '.page.js'
ifnot = '/static'
bin = '/nodejs/path/here'
