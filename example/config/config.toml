#:schema ./config.schema.json

[[server]]
ports = [1998]

[[server.route]]
preffix = "/"
path = "/var/www/html"
index = "index.php"

[[server.route]]
preffix = "/imgs"
path = "/usr"

[[server.api]]
uri = "/api/hello"
external = false
func = "echo"

[[server.cgi]]
glob = "/*.php"
bin = "/usr/bin/php-cgi"
